<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHSM Helper - Study Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Bordeaux/Dark Red Palette */
            --primary-deep: #6D071A; /* Deep Bordeaux */
            --primary-medium: #8C1B2F; /* Medium Bordeaux */
            --primary-light-accent: #B83B5E; /* Lighter red for accents */
            
            --primary: var(--primary-medium);
            --primary-darker: var(--primary-deep);
            --accent: var(--primary-light-accent);

            --text-light: #f8f9fa; /* Very light grey for text on dark backgrounds */
            --text-dark: #212529;  /* Very dark grey/off-black for main text */
            --text-muted: #6c757d; /* Muted grey for secondary text */
            
            --bg-main: #f1f3f5;      /* Light grey main background */
            --bg-container: #ffffff; /* White container background */
            --bg-chat-area: #e9ecef; /* Slightly darker grey for chat area */
            --bg-input: #f8f9fa;     /* Very light grey for input field background */

            --border-light: #dee2e6;
            --border-focused: var(--primary);
            
            --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-medium: 0 8px 24px rgba(0, 0, 0, 0.07);

            --error-bg: #f8d7da;
            --error-text: #721c24;
            --error-border: #f5c6cb;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-container);
            border-radius: 24px;
            box-shadow: var(--shadow-medium);
            overflow: hidden;
            height: 85vh;
            max-height: 750px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
        }
        
        .chat-header {
            background: linear-gradient(135deg, var(--primary-darker), var(--primary));
            color: var(--text-light);
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .bot-avatar {
            width: auto;
            height: 48px;
            background: #ffffff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            overflow: hidden;
            padding: 5px 8px;
        }
        
        .bot-avatar img {
            height: 38px;
            width: auto;
            object-fit: contain;
        }
        
        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        
        .chat-header p {
            font-size: 0.8rem;
            margin: 0;
            opacity: 0.85;
        }
        
        .online-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            padding: 5px 10px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #28a745; /* Green for online */
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.4);
        }
        
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--bg-chat-area);
        }
        
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
            line-height: 1.55;
            font-size: 0.92rem;
            word-wrap: break-word;
            box-shadow: var(--shadow-soft);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .user-message {
            background-color: var(--primary);
            color: var(--text-light);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        
        .bot-message {
            background-color: var(--bg-container);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid var(--border-light);
        }

        .bot-message.error-message {
            background-color: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
        }
        .bot-message.error-message .message-time {
            color: var(--error-text);
            opacity: 0.7;
        }

        .bot-message.sources-list {
            background-color: #fdf1f3; /* Very light bordeaux tint for sources */
            font-size: 0.85rem;
            border-left: 4px solid var(--primary-light-accent);
            padding-left: 15px;
        }
        .bot-message.sources-list strong {
            display: block;
            margin-bottom: 6px;
            color: var(--primary-darker);
            font-weight: 600;
        }
        .bot-message.sources-list ul {
            list-style-position: inside;
            padding-left: 0;
            margin-top: 5px;
        }
        .bot-message.sources-list li {
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        
        .message-time {
            font-size: 0.7rem;
            margin-top: 6px;
            opacity: 0.7;
            text-align: right;
            display: block;
        }
        
        .bot-message .message-time {
            color: var(--text-muted);
        }
        
        .user-message .message-time {
            color: rgba(248, 249, 250, 0.75);
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            background-color: var(--bg-container);
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            align-self: flex-start;
            max-width: fit-content;
            height: 40px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-light);
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.8;
            animation: typingAnimation 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typingAnimation {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .chat-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-light);
            background-color: var(--bg-container);
        }
        
        .message-input-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--bg-input);
            border-radius: 25px;
            padding: 5px;
            border: 1px solid var(--border-light);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .message-input-container:focus-within {
             border-color: var(--border-focused);
             box-shadow: 0 0 0 3px hsla(var(--hue-primary, 345), 70%, 50%, 0.2);
        }
        
        .message-input {
            flex: 1;
            border: none;
            border-radius: 20px;
            padding: 12px 18px;
            outline: none;
            font-size: 0.95rem;
            background-color: transparent;
            color: var(--text-dark);
        }
        
        .send-button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: var(--primary);
            color: var(--text-light);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.15s ease;
        }
        
        .send-button:hover {
            background-color: var(--primary-darker);
            transform: scale(1.05);
        }
        
        .send-button:active {
            transform: scale(0.95);
        }
        
        .send-button i {
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }
        .send-button:hover i {
            transform: rotate(15deg);
        }
        
        .branding {
            margin-top: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .branding span {
            color: var(--primary-darker);
            font-weight: 500;
        }
        
        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-track {
            background: var(--bg-chat-area);
            border-radius: 10px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: #adb5bd; /* Neutral scrollbar thumb */
            border-radius: 10px;
        }
        .chat-body::-webkit-scrollbar-thumb:hover {
            background: #868e96;
        }

        @media (max-width: 500px) {
            .chat-container {
                height: calc(100vh - 30px);
                max-height: none;
                border-radius: 15px;
            }
            body {
                padding: 10px;
            }
            .chat-header h1 { font-size: 1.1rem; }
            .message { padding: 10px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="bot-avatar">
                    <img src="/nhsm-logo.png" alt="NHSM Logo" onerror="this.src='https://th.bing.com/th/id/R.34b61d440a4cb340b8ac856f3159c2b1?rik=IqpkMdAHYTE0sw&riu=http%3a%2f%2fnhsm.edu.dz%2fwp-content%2fuploads%2f2022%2f07%2fH-3.png&ehk=tVyn4%2bLOcMLQGraYhtztV6dwSULaZkj7vmdano74OxU%3d&risl=&pid=ImgRaw&r=0'">
                </div>
                <div>
                    <h1>NHSM Helper</h1>
                    <p>Your Study Assistant</p>
                </div>
            </div>
            <div class="online-indicator">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
        </div>
        
        <div class="chat-body" id="chatBody">
            <!-- Initial bot message will be added by JS -->
        </div>
        
        <div class="chat-footer">
            <div class="message-input-container">
                <input type="text" class="message-input" id="messageInput" placeholder="Ask your question..." onkeypress="handleKeyPress(event)">
                <button class="send-button" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <div class="branding">
        Powered by <span>NHSM Helper</span> © 2025
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.querySelector('.send-button');
        const API_ENDPOINT_STREAM = '/api/query-stream';
        const API_ENDPOINT = '/api/query';

        let isProcessing = false; // Protection contre questions multiples

        function sendMessage() {
            const message = messageInput.value.trim();
            
            // Protection contre questions multiples
            if (isProcessing) {
                addMessageToUI("Veuillez attendre la réponse à votre question précédente.", 'bot', true);
                return;
            }
            
            // Validation longueur
            if (message.length > 1000) {
                addMessageToUI("Votre message est trop long (max 1000 caractères).", 'bot', true);
                return;
            }
            
            if (message !== '') {
                addMessageToUI(message, 'user');
                messageInput.value = '';
                disableInput();
                getResponseFromAPI(message);
            }
        }

        function disableInput() {
            isProcessing = true;
            messageInput.disabled = true;
            sendButton.disabled = true;
            sendButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        }

        function enableInput() {
            isProcessing = false;
            messageInput.disabled = false;
            sendButton.disabled = false;
            sendButton.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }

        function addMessageToUI(content, sender, isErrorMessage = false, isSourcesMessage = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            
            if (sender === 'user') {
                messageDiv.classList.add('user-message');
            } else {
                messageDiv.classList.add('bot-message');
                if (isErrorMessage) {
                    messageDiv.classList.add('error-message');
                }
                if (isSourcesMessage) {
                    messageDiv.classList.add('sources-list');
                }
            }
            
            messageDiv.innerHTML = marked.parse(content);
            
            const now = new Date();
            const timeDiv = document.createElement('div');
            timeDiv.classList.add('message-time');
            timeDiv.textContent = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            messageDiv.appendChild(timeDiv);
            
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
            
            return messageDiv;
        }

        // Streaming avec fallback
        async function getResponseFromAPI(userQuery) {
            showTypingIndicator();
            
            try {
                // Essayer le streaming d'abord
                await getStreamingResponse(userQuery);
            } catch (error) {
                console.log('Streaming failed, using fallback:', error);
                await getFallbackResponse(userQuery);
            }
        }

        async function getStreamingResponse(userQuery) {
            const response = await fetch(API_ENDPOINT_STREAM, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'text/plain'
                },
                body: JSON.stringify({ query: userQuery })
            });

            if (!response.ok) {
                throw new Error(`Streaming failed: ${response.status}`);
            }

            hideTypingIndicator();
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            let buffer = '';
            let sources = [];
            let messageDiv = null;
            let contentDiv = null;
            
            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    // Traiter les données du buffer
                    if (buffer.includes('SOURCES:') && !sources.length) {
                        const sourcesMatch = buffer.match(/SOURCES:(.+?)\n/);
                        if (sourcesMatch) {
                            sources = JSON.parse(sourcesMatch[1]);
                            buffer = buffer.replace(/SOURCES:.+?\n\n/, '');
                            
                            // Créer le div de message une fois
                            messageDiv = addMessageToUI('', 'bot');
                            contentDiv = messageDiv.querySelector('p') || messageDiv;
                            contentDiv.innerHTML = '';
                        }
                    }
                    
                    // Afficher le contenu au fur et à mesure
                    if (messageDiv && contentDiv) {
                        // Nettoyer les métadonnées
                        const cleanBuffer = buffer.replace(/PROCESSING_TIME:.+/, '');
                        contentDiv.innerHTML = marked.parse(cleanBuffer);
                        chatBody.scrollTop = chatBody.scrollHeight;
                    }
                }
                
                // Afficher les sources à la fin
                if (sources.length > 0) {
                    displaySources(sources);
                }
                
            } finally {
                enableInput();
            }
        }

        async function getFallbackResponse(userQuery) {
            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ query: userQuery })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Erreur serveur (${response.status})`);
                }

                const data = await response.json();
                
                if (data.success && data.answer) {
                    addMessageToUI(data.answer, 'bot');
                    if (data.sources && data.sources.length > 0) {
                        displaySources(data.sources);
                    }
                } else {
                    throw new Error(data.message || "Impossible de générer une réponse.");
                }
                
            } catch (error) {
                console.error('Fallback error:', error);
                addMessageToUI(`Erreur: ${error.message}`, 'bot', true);
                useLocalFallbackResponse(userQuery);
            } finally {
                enableInput();
            }
        }

        function useLocalFallbackResponse(userQuery) {
            const fallbackResponses = [
                "Désolé, je ne peux pas répondre pour le moment. Veuillez réessayer plus tard.",
                "Service temporairement indisponible. Merci de votre patience.",
                "Erreur de connexion au serveur. Veuillez vérifier votre connexion internet."
            ];
            const randomResponse = fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)];
            addMessageToUI(randomResponse, 'bot', true);
        }

        function showTypingIndicator() {
            if (!document.getElementById('typingIndicator')) {
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typingIndicator';
                typingDiv.classList.add('typing-indicator');
                for (let i = 0; i < 3; i++) {
                    const dot = document.createElement('div');
                    dot.classList.add('typing-dot');
                    typingDiv.appendChild(dot);
                }
                chatBody.appendChild(typingDiv);
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }

        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function displaySources(sources) {
            let sourcesHtml = '<strong>Sources pertinentes:</strong><ul>';
            sources.forEach(source => {
                const sourceTitle = source.title || source.question || `ID: ${source.id || 'N/A'}`;
                sourcesHtml += `<li>${source.category || 'Source'} - ${sourceTitle}</li>`;
            });
            sourcesHtml += '</ul>';
            addMessageToUI(sourcesHtml, 'bot', false, true);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isProcessing) {
                sendMessage();
            }
        }

        // Message d'accueil
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                addMessageToUI("Bonjour! Je suis NHSM Helper, votre assistant personnel pour étudier les mathématiques efficacement. Comment puis-je vous aider aujourd'hui?", 'bot');
            }, 500);
        });
    </script>
</body>
</html>
